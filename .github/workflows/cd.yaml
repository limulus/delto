name: Continuous Delivery

on: push

jobs:
  # Job name is the branch-protection required-check context, so keep it stable
  # (no Node version baked in) — a runner bump (∆uFs) shouldn't orphan the check.
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run verify
      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: coverage
          path: coverage/
      # After the coverage upload: the pack's prepack → clean deletes coverage/
      - run: npm run test:pack

  publish:
    needs: verify
    runs-on: ubuntu-latest
    name: publish package if needed
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
